<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ログイン - FC尾島ジュニア</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 52 60%22%3E%3Cpath d=%22M26 2 48 9v22c0 15-10 22-22 27C14 53 4 46 4 31V9z%22 fill=%22%231C1600%22/%3E%3Cg%3E%3Crect x=%228%22 y=%228%22 width=%2236%22 height=%2244%22 fill=%22%23E8A200%22/%3E%3Crect x=%2216%22 y=%228%22 width=%225%22 height=%2244%22 fill=%22%231C1600%22/%3E%3Crect x=%2231%22 y=%228%22 width=%225%22 height=%2244%22 fill=%22%231C1600%22/%3E%3C/g%3E%3Ccircle cx=%2226%22 cy=%2228%22 r=%227%22 fill=%22%23fff%22/%3E%3C/svg%3E">
    <link rel="stylesheet" href="../css/common.css?v=20260719">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body {
            margin: 0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
            box-sizing: border-box;
            background: #0f0c00;
            position: relative;
            overflow: hidden;
        }
        /* 背景: 生成したピッチ画像 + 暗幕。画像が無くてもグラデ地で成立 */
        .login-bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(120% 80% at 50% -10%, rgba(232,162,0,.22), transparent 55%),
                linear-gradient(180deg, #241d06 0%, #17110a 45%, #0c0900 100%);
        }
        .login-bg::before {
            /* 生成画像レイヤー（存在すれば表示） */
            content: '';
            position: absolute; inset: 0;
            background-image: url("../img/login-hero.webp");
            background-size: cover;
            background-position: center 30%;
            opacity: .38;
            mix-blend-mode: screen;
        }
        .login-bg::after {
            /* ユニフォームの斜めストライプを極薄で */
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(118deg, rgba(232,162,0,.05) 0 14px, transparent 14px 30px);
            mask-image: linear-gradient(180deg, transparent, #000 40%, #000 70%, transparent);
            -webkit-mask-image: linear-gradient(180deg, transparent, #000 40%, #000 70%, transparent);
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            background: linear-gradient(180deg, rgba(38,31,10,.92), rgba(22,17,7,.94));
            border: 1px solid rgba(232,162,0,.28);
            border-radius: 22px;
            padding: 38px 28px 30px;
            text-align: center;
            box-shadow: 0 24px 60px -12px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
        }
        /* カード上端のストライプ */
        .login-card::before {
            content: '';
            position: absolute; left: 26px; right: 26px; top: 0; height: 3px;
            border-radius: 0 0 3px 3px;
            background: repeating-linear-gradient(90deg, #E8A200 0 9px, #1C1600 9px 18px);
            opacity: .85;
        }

        .crest { width: 92px; height: 104px; margin: 0 auto 14px; display: block; filter: drop-shadow(0 6px 14px rgba(0,0,0,.55)); }

        .brand-name {
            font-size: 26px;
            font-weight: 900;
            color: #F5B733;
            letter-spacing: .04em;
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0,0,0,.5);
        }
        .brand-sub {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .32em;
            color: rgba(243,236,216,.62);
            margin: 6px 0 0;
            text-transform: uppercase;
        }
        .brand-rule {
            width: 46px; height: 2px; margin: 18px auto 22px;
            background: linear-gradient(90deg, transparent, #E8A200, transparent);
        }
        .brand-lead {
            color: rgba(243,236,216,.78);
            font-size: 13.5px;
            margin: 0 0 24px;
            line-height: 1.7;
        }

        .google-signin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(135deg, #F7C24A 0%, #E8A200 55%, #CC8C00 100%);
            border: none;
            border-radius: 13px;
            font-size: 15.5px;
            font-weight: 800;
            color: #1C1600;
            cursor: pointer;
            box-shadow: 0 8px 20px -4px rgba(232,162,0,.5);
            transition: transform .12s, box-shadow .2s, filter .2s;
            font-family: inherit;
            min-height: 52px;
        }
        .google-signin-btn:hover { filter: brightness(1.04); box-shadow: 0 10px 26px -4px rgba(232,162,0,.62); }
        .google-signin-btn:active { transform: translateY(1px) scale(.995); }
        .google-signin-btn:disabled { opacity: .4; cursor: not-allowed; }
        .g-badge { width: 26px; height: 26px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .google-icon { width: 17px; height: 17px; }

        .login-error {
            margin-top: 18px; padding: 12px;
            background: rgba(219,75,75,.15);
            border: 1px solid rgba(219,75,75,.4);
            border-radius: 10px; color: #ffb4b4; font-size: 13px; display: none;
        }
        .login-note { margin-top: 22px; font-size: 11.5px; color: rgba(243,236,216,.45); line-height: 1.6; }

        .browser-warning {
            background: rgba(232,162,0,.12);
            border: 1px solid rgba(232,162,0,.4);
            border-radius: 12px; padding: 18px; margin-bottom: 20px; text-align: left;
        }
        .browser-warning h3 { margin: 0 0 8px; font-size: 14px; color: #F5B733; }
        .browser-warning p { margin: 0 0 10px; font-size: 12.5px; color: rgba(243,236,216,.8); line-height: 1.6; }
        .browser-warning .url-box {
            background: rgba(0,0,0,.35); border: 1px solid rgba(232,162,0,.3);
            border-radius: 6px; padding: 8px 10px; font-size: 12px; word-break: break-all; color: #f3ecd8; margin-bottom: 10px;
        }
        .copy-url-btn {
            width: 100%; padding: 11px; background: var(--grad-gold, #E8A200); border: none;
            border-radius: 8px; font-size: 14px; font-weight: 800; color: #1C1600; cursor: pointer;
        }
        .copy-url-btn:active { opacity: .85; }
    </style>
</head>
<body>
    <div class="login-bg"></div>

    <div class="login-card">
        <!-- チームエンブレム（黄×黒ストライプの盾＋ボール＋1985） -->
        <svg class="crest" viewBox="0 0 92 104" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <clipPath id="shieldClip">
                    <path d="M46 5 84 17v34c0 24-16 34-38 43C24 85 8 75 8 51V17z"/>
                </clipPath>
                <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="#F7C24A"/>
                    <stop offset="1" stop-color="#CC8C00"/>
                </linearGradient>
            </defs>
            <!-- 外枠 -->
            <path d="M46 2 87 15v36c0 26-17 37-41 46C22 88 5 77 5 51V15z" fill="url(#goldEdge)"/>
            <path d="M46 5 84 17v34c0 24-16 34-38 43C24 85 8 75 8 51V17z" fill="#1C1600"/>
            <!-- 縞（クリップ内） -->
            <g clip-path="url(#shieldClip)">
                <rect x="6" y="4" width="80" height="92" fill="#E8A200"/>
                <rect x="22" y="4" width="10" height="92" fill="#1C1600"/>
                <rect x="48" y="4" width="10" height="92" fill="#1C1600"/>
                <rect x="74" y="4" width="10" height="92" fill="#1C1600"/>
            </g>
            <!-- サッカーボール -->
            <circle cx="46" cy="44" r="15" fill="#fff" stroke="#1C1600" stroke-width="2.4"/>
            <path d="M46 34l6.3 4.6-2.4 7.4h-7.8l-2.4-7.4z" fill="#1C1600"/>
            <path d="M35.5 40.5l3 2.2M56.5 40.5l-3 2.2M42 54l1.4-4.2M50 54l-1.4-4.2" stroke="#1C1600" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <!-- リボン 1985 -->
            <rect x="26" y="66" width="40" height="13" rx="2.5" fill="#1C1600"/>
            <text x="46" y="75.6" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="800" fill="#F5B733" letter-spacing="1.5">1985</text>
        </svg>

        <h1 class="brand-name">FC尾島ジュニア</h1>
        <p class="brand-sub">Ojima Junior FC</p>
        <div class="brand-rule"></div>

        <!-- LINEブラウザ警告 -->
        <div class="browser-warning" id="browser-warning" style="display:none;">
            <h3>⚠️ このブラウザではログインできません</h3>
            <p>LINEなどのアプリ内ブラウザでは、GoogleのセキュリティポリシーによりGoogleログインがブロックされます。以下のURLを Safari または Chrome で開いてください。</p>
            <div class="url-box" id="current-url"></div>
            <button class="copy-url-btn" id="copy-url-btn">URLをコピー</button>
        </div>

        <p class="brand-lead">チームの運営・配車・出欠管理を<br>ひとつにまとめるメンバー専用アプリ。</p>

        <button class="google-signin-btn" id="google-signin-btn">
            <span class="g-badge">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
            </span>
            Googleでログイン
        </button>

        <div class="login-error" id="login-error"></div>
        <p class="login-note">チームメンバーのGoogleアカウントでログインしてください。<br>初めての方は登録申請後、管理者の承認をお待ちください。</p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="../js/common/firebase-config.js?v=20260611"></script>

    <script>
        // LINEなどのアプリ内ブラウザを検出（Google OAuthが使えない）
        var ua = navigator.userAgent;
        var isInAppBrowser = /Line\/|FBAN|FBAV|Instagram|Twitter|Snapchat|MicroMessenger/i.test(ua)
            || (/Android/.test(ua) && /Version\/[\d.]+.*Chrome\/[\d.]+ Mobile/.test(ua) === false && /wv/.test(ua));

        if (isInAppBrowser) {
            var warning = document.getElementById('browser-warning');
            var urlBox = document.getElementById('current-url');
            var signinBtn = document.getElementById('google-signin-btn');
            var loginUrl = window.location.href;

            warning.style.display = 'block';
            urlBox.textContent = loginUrl;
            signinBtn.disabled = true;
            signinBtn.style.opacity = '0.4';
            signinBtn.style.cursor = 'not-allowed';

            document.getElementById('copy-url-btn').addEventListener('click', function() {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(loginUrl).then(function() {
                        document.getElementById('copy-url-btn').textContent = 'コピーしました!';
                        setTimeout(function() {
                            document.getElementById('copy-url-btn').textContent = 'URLをコピー';
                        }, 2000);
                    });
                } else {
                    var el = document.getElementById('current-url');
                    var range = document.createRange();
                    range.selectNode(el);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    document.getElementById('copy-url-btn').textContent = 'コピーしました!';
                    setTimeout(function() {
                        document.getElementById('copy-url-btn').textContent = 'URLをコピー';
                    }, 2000);
                }
            });
        }

        const loginAuth = window.FCOjimaFirebase.auth;

        // 既にログイン済みなら HUB へ
        loginAuth.onAuthStateChanged(function(user) {
            if (user) {
                window.location.href = '/hub/index.html';
            }
        });

        document.getElementById('google-signin-btn').addEventListener('click', function() {
            if (isInAppBrowser) return;
            const provider = new firebase.auth.GoogleAuthProvider();
            loginAuth.signInWithPopup(provider)
                .then(function(result) {
                    window.location.href = '/hub/index.html';
                })
                .catch(function(error) {
                    const errorEl = document.getElementById('login-error');
                    errorEl.textContent = 'ログインに失敗しました: ' + error.message;
                    errorEl.style.display = 'block';
                });
        });
    </script>
</body>
</html>
