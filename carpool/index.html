<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配車管理 - FC尾島ジュニア</title>
    <link rel="stylesheet" href="../css/common.css?v=20260306">
    <link rel="stylesheet" href="../css/carpool/common.css?v=20260307">
    <link rel="stylesheet" href="../css/carpool/overview.css?v=20260219">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 id="event-header">FC尾島ジュニア 配車管理</h1>
    </header>

    <nav class="carpool-nav">
        <a href="index.html" class="active">概要</a>
        <a href="attendance.html">出欠確認</a>
        <a href="cars.html">車提供</a>
        <a href="assignments.html">割り当て</a>
        <a href="notifications.html">連絡</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>イベント概要</h2>
            <div id="event-summary" class="event-details">
                <!-- イベント情報がここに表示される -->
                <div class="loading">読み込み中...</div>
            </div>
            <div id="overview-files-section" style="margin-top:16px;border-top:1px solid #eee;padding-top:14px;display:none;">
                <h3 style="font-size:14px;margin:0 0 8px;color:#555;">添付ファイル</h3>
                <div id="overview-files-list" style="margin-bottom:10px;display:flex;flex-direction:column;gap:6px;"></div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="file" id="overview-file-input" multiple style="display:none;">
                    <button id="overview-file-upload-btn" class="primary-button" style="font-size:13px;padding:8px 16px;">ファイルを追加</button>
                </div>
            </div>
        </div>

        <div id="status-summary" class="status-summary">
            <!-- 状況サマリーがJSで動的に生成される -->
            <div class="loading">読み込み中...</div>
        </div>
    </div>

    <!-- グローバルナビゲーション -->
    <div class="global-navigation">
        <button id="back-to-hub">HUBに戻る</button>
        <button id="share-event-button" class="share-button">LINEで共有</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="../js/common/firebase-config.js?v=20260219"></script>

    <!-- 共通モジュール -->
    <script src="../js/common/global.js?v=20260219"></script>
    <script src="../js/common/utils.js?v=20260219"></script>
    <script src="../js/common/storage.js?v=20260219"></script>
    <script src="../js/common/ui.js?v=20260219"></script>
    <script src="../js/common/auth.js?v=20260219"></script>
    <script src="../js/common/db.js?v=20260219"></script>

    <!-- 配車管理用モジュール -->
    <script src="../js/carpool/overview.js?v=20260219"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await FCOjima.Auth.requireLogin();

            // 概要機能の初期化（Firestore非同期ロードのためawait必須）
            if (FCOjima.Carpool.Overview && FCOjima.Carpool.Overview.init) {
                await FCOjima.Carpool.Overview.init();
            }

            document.getElementById('back-to-hub').addEventListener('click', function() {
                if (FCOjima.Carpool.Overview && FCOjima.Carpool.Overview.goToMainPage) {
                    FCOjima.Carpool.Overview.goToMainPage();
                } else {
                    window.location.href = '../hub/index.html';
                }
            });

            document.getElementById('share-event-button').addEventListener('click', function() {
                if (FCOjima.Carpool.Overview && FCOjima.Carpool.Overview.shareEventViaLINE) {
                    FCOjima.Carpool.Overview.shareEventViaLINE();
                }
            });
        });
    </script>
</body>
</html>
