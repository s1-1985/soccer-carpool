<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座席割り当て - FC尾島ジュニア</title>
    <link rel="stylesheet" href="../css/common.css?v=20260302b">
    <link rel="stylesheet" href="../css/carpool/common.css?v=20260302b">
    <link rel="stylesheet" href="../css/carpool/assignment.css?v=20260302b">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 id="event-header">FC尾島ジュニア 座席割り当て</h1>
    </header>

    <nav class="carpool-nav">
        <a href="index.html">概要</a>
        <a href="attendance.html">出欠確認</a>
        <a href="cars.html">車提供</a>
        <a href="assignments.html" class="active">割り当て</a>
        <a href="notifications.html">連絡</a>
    </nav>

    <div class="container">
        <div id="assignment-event-info" class="event-summary">
            <!-- イベント情報がJSで動的に生成される -->
            <div class="loading">読み込み中...</div>
        </div>

        <!-- ツールバー（通常モード時表示） -->
        <div class="assignment-toolbar">
            <button id="layout-toggle-btn" class="layout-toggle-btn" title="レイアウト切り替え">
                <span id="layout-btn-label">⇄ 横レイアウトに切り替え</span>
            </button>
            <button id="open-fs-btn" class="open-fs-btn">⤢ 全画面で作業</button>
        </div>

        <!-- 作業エリアラッパー（全画面モード時にここが全画面化される） -->
        <div id="assignment-work-area">
            <!-- 全画面モード専用ヘッダー（通常時は非表示） -->
            <div class="fs-work-header">
                <span class="fs-title" id="fs-event-title">座席割り当て</span>
                <div class="fs-controls">
                    <button id="fs-layout-btn" class="layout-toggle-btn fs-layout-btn" title="レイアウト切り替え">
                        <span id="fs-layout-label">⇄ 横</span>
                    </button>
                    <button id="close-fs-btn" class="close-fs-btn">✕ 閉じる</button>
                </div>
            </div>

            <!-- 車両座席エリア＋メンバーリストエリア -->
            <div class="assignment-container">
                <div class="car-seats-container">
                    <h3>車両座席配置 <span style="font-size:12px;font-weight:normal;color:#888;">運転手アイコンをタップで変更</span></h3>
                    <div class="cars-scroll-area" id="cars-container">
                        <div class="loading">読み込み中...</div>
                    </div>
                </div>

                <div class="members-assignment-container">
                    <h3>配置待ちメンバー <span style="font-size:12px;font-weight:normal;color:#888;">ドラッグまたは座席タップで配置</span></h3>
                    <div class="members-scroll-area" id="members-container">
                        <div class="loading">読み込み中...</div>
                    </div>
                </div>
            </div>

            <div class="assignment-action-buttons">
                <button id="generate-random" class="random-assign-button">ランダム配置</button>
                <button id="reset-assignments" class="reset-button">リセット</button>
                <button id="save-assignments" class="save-button">保存</button>
                <button id="open-comment-btn" class="comment-button">コメント</button>
                <button id="export-image" class="export-image-button">画像で出力</button>
            </div>

            <!-- コメントセクション（画面最下部） -->
            <div class="assignment-comment-section" id="assignment-comment-section">
                <div class="comment-label">コメント（LINEシェア・画像出力に反映）</div>
                <textarea id="assignment-comment" placeholder="この配車割り振りについてのコメントを入力..."></textarea>
                <button type="button" id="save-comment-btn" class="assignment-comment-save-btn">コメントを保存</button>
            </div>
        </div>
    </div>

    <!-- 座席編集モーダル（スマホではボトムシート風に表示） -->
    <div id="seat-edit-modal" class="modal seat-modal-bottom">
        <div class="modal-content seat-modal-content">
            <div class="modal-drag-handle"></div>
            <h2 style="font-size:16px;margin-bottom:6px;">座席に配置するメンバーを選択</h2>
            <div id="seat-current-info" style="padding:6px 8px;background:#f5f5f5;border-radius:4px;margin-bottom:8px;font-size:0.85em;color:#555;"></div>
            <div id="seat-member-list" style="flex:1;overflow-y:auto;border:1px solid #eee;border-radius:4px;min-height:80px;max-height:45vh;">
                <!-- メンバーリストがJSで動的に生成される -->
            </div>
            <form id="seat-edit-form">
                <input type="hidden" id="seat-person">
                <div class="form-actions" style="margin-top:8px;gap:8px;">
                    <button type="button" id="cancel-seat-edit">キャンセル</button>
                    <button type="button" id="clear-seat" class="delete-button">座席をクリア</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 座席数変更モーダル -->
    <div id="seat-count-modal" class="modal seat-modal-bottom">
        <div class="modal-content seat-modal-content">
            <div class="modal-drag-handle"></div>
            <h2 style="font-size:16px;margin-bottom:6px;">座席数を変更</h2>
            <p id="seat-count-car-name" style="font-size:13px;color:#666;margin-bottom:12px;"></p>
            <div id="seat-count-form-rows"></div>
            <div class="form-actions" style="margin-top:14px;gap:10px;">
                <button type="button" id="cancel-seat-count">キャンセル</button>
                <button type="button" id="apply-seat-count" class="save-button">確定</button>
            </div>
        </div>
    </div>

    <!-- 運転手変更モーダル -->
    <div id="driver-edit-modal" class="modal seat-modal-bottom">
        <div class="modal-content seat-modal-content">
            <div class="modal-drag-handle"></div>
            <h2 style="font-size:16px;margin-bottom:6px;">運転手を変更</h2>
            <p id="driver-modal-car-info" style="font-size:13px;color:#666;margin-bottom:8px;"></p>
            <div id="driver-modal-list" style="flex:1;overflow-y:auto;border:1px solid #eee;border-radius:4px;min-height:60px;max-height:45vh;">
                <!-- 候補リストがJSで動的に生成される -->
            </div>
            <div class="form-actions" style="margin-top:8px;">
                <button type="button" id="cancel-driver-edit">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- グローバルナビゲーション -->
    <div class="global-navigation">
        <button id="back-to-hub">HUBに戻る</button>
        <button id="save-and-share-button" class="share-button">保存して共有</button>
    </div>

    <!-- html2canvas（画像エクスポート用） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../js/common/firebase-config.js?v=20260302b"></script>

    <!-- 共通モジュール -->
    <script src="../js/common/global.js?v=20260302b"></script>
    <script src="../js/common/utils.js?v=20260302b"></script>
    <script src="../js/common/storage.js?v=20260302b"></script>
    <script src="../js/common/ui.js?v=20260302b"></script>
    <script src="../js/common/auth.js?v=20260302b"></script>
    <script src="../js/common/db.js?v=20260302b"></script>

    <!-- 配車管理用モジュール -->
    <script src="../js/carpool/overview.js?v=20260302b"></script>
    <script src="../js/carpool/assignment.js?v=20260302b"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await FCOjima.Auth.requireLogin();
            // モーダル初期化
            FCOjima.UI.initModals();
            
            // 割り当て機能の初期化（Firestore非同期ロードのためawait必須）
            if (FCOjima.Carpool.Assignment && FCOjima.Carpool.Assignment.init) {
                await FCOjima.Carpool.Assignment.init();
            } else {
                console.error('割り当て機能の初期化に失敗しました');
            }
            
            // イベント情報の表示
            if (FCOjima.Carpool.Overview && FCOjima.Carpool.Overview.displayEventSummary) {
                FCOjima.Carpool.Overview.displayEventSummary('assignment-event-info');
            }
            
            // HUBに戻るボタンの設定
            document.getElementById('back-to-hub').addEventListener('click', function() {
                if (FCOjima.Carpool.Overview && FCOjima.Carpool.Overview.goToMainPage) {
                    FCOjima.Carpool.Overview.goToMainPage();
                } else {
                    window.location.href = '../hub/index.html';
                }
            });
            
            // 画像で出力ボタンの設定
            document.getElementById('export-image').addEventListener('click', function() {
                if (FCOjima.Carpool.Assignment && FCOjima.Carpool.Assignment.exportAssignmentsAsImage) {
                    FCOjima.Carpool.Assignment.exportAssignmentsAsImage();
                }
            });

            // 保存して共有ボタンの設定
            document.getElementById('save-and-share-button').addEventListener('click', function() {
                if (FCOjima.Carpool.Assignment) {
                    if (FCOjima.Carpool.Assignment.saveAssignments) {
                        FCOjima.Carpool.Assignment.saveAssignments();
                    }
                    if (FCOjima.Carpool.Assignment.shareAssignments) {
                        FCOjima.Carpool.Assignment.shareAssignments();
                    }
                }
            });
        });
    </script>
</body>
</html>
